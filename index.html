/* ============================================================
   FIELD NOTES — A-1 Workshop English Prep
   Aesthetic: warm paper, ink, forest, ochre. Botanical journal.
   ============================================================ */

:root {
  --paper: #F5F1E8;
  --paper-2: #EDE7D8;
  --paper-shadow: rgba(31, 27, 22, 0.06);
  --ink: #1F1B16;
  --ink-soft: #4A4339;
  --ink-faint: #8A8275;
  --rule: #C9C0AC;
  --rule-soft: #D9D2BF;
  --forest: #4A6741;
  --forest-deep: #324A2C;
  --moss: #6B7A52;
  --ochre: #B8895C;
  --ochre-deep: #8E6B45;
  --crimson: #A6443A;
  --leaf: #768B5E;
  --grain: 0.04;

  --serif: ui-serif, "New York", "Iowan Old Style", "Apple Garamond", "Hoefler Text", Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  --mono: ui-monospace, "IBM Plex Mono", "Courier Prime", Menlo, monospace;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: contain;
}
body {
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(184,137,92,0.06), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(74,103,65,0.05), transparent 40%);
}
/* paper grain overlay */
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
  background-size: 180px 180px;
  opacity: var(--grain);
  mix-blend-mode: multiply;
}

button, input, textarea, select {
  font: inherit; color: inherit; background: transparent; border: none;
}
button { cursor: pointer; }

a { color: var(--forest-deep); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }

/* ====================== APP SHELL ====================== */
#app {
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: calc(var(--safe-top) + 56px);
  padding-bottom: calc(var(--safe-bottom) + 76px);
  position: relative;
  z-index: 2;
}

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: var(--safe-top) 18px 0;
  height: calc(var(--safe-top) + 56px);
  display: flex; align-items: flex-end;
  background: linear-gradient(to bottom, var(--paper) 70%, rgba(245,241,232,0));
  pointer-events: none;
}
.topbar-inner {
  width: 100%;
  height: 56px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--rule);
  pointer-events: auto;
}
.brand {
  font-family: var(--serif);
  font-size: 14px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-style: italic;
}
.brand-mark {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--crimson);
  margin-right: 8px;
  vertical-align: 2px;
}
.day-chip {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  padding: 4px 10px;
  border: 1px solid var(--rule);
  border-radius: 100px;
}

/* ====================== BOTTOM NAV ====================== */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding-bottom: var(--safe-bottom);
  background: var(--paper);
  border-top: 1px solid var(--rule);
}
.bottomnav-inner {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: 76px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  color: var(--ink-faint);
  font-family: var(--serif);
  position: relative;
  padding: 8px 0;
  transition: color 0.15s ease;
}
.nav-item.active { color: var(--ink); }
.nav-item.active::before {
  content: "";
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 2px;
  background: var(--crimson);
}
.nav-glyph {
  font-size: 20px;
  font-weight: 500;
  font-family: "Hiragino Mincho ProN", "YuMincho", "Yu Mincho", serif;
  letter-spacing: 0;
}
.nav-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-family: var(--mono);
}

/* ====================== PAGE / VIEW ====================== */
.view {
  padding: 20px 22px 32px;
  max-width: 720px;
  margin: 0 auto;
  animation: fade .25s ease both;
}
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

h1.title {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 30px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.title-rule {
  display: flex; align-items: center; gap: 10px;
  margin: 8px 0 22px;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.title-rule::after {
  content: ""; flex: 1; height: 1px; background: var(--rule);
}
.kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ochre-deep);
  margin-bottom: 8px;
}
h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.005em;
  margin: 28px 0 10px;
}
h3 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 16px;
  margin: 18px 0 6px;
  color: var(--ink-soft);
}
p { margin-bottom: 12px; color: var(--ink); }
p.lead {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.6;
}
small.note {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}

/* ====================== CARDS / PAPER PANELS ====================== */
.panel {
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 18px 18px 16px;
  margin-bottom: 16px;
  position: relative;
}
.panel::before {
  content: ""; position: absolute; top: 8px; right: 8px; bottom: 8px; left: 8px;
  border: 1px dashed var(--rule-soft);
  pointer-events: none;
  opacity: 0.55;
}
.panel.flat { background: transparent; border: 1px solid var(--rule); }
.panel.flat::before { display: none; }

/* ====================== HOME / DASHBOARD ====================== */
.hero {
  margin: 12px 0 18px;
}
.hero-line {
  font-family: var(--serif);
  font-size: 28px;
  line-height: 1.3;
  letter-spacing: -0.005em;
}
.hero-line .accent { color: var(--forest); font-style: italic; }

.day-card {
  border: 1px solid var(--rule);
  background: var(--paper);
  padding: 16px 18px;
  margin-bottom: 12px;
  display: block;
  text-decoration: none;
  color: inherit;
  position: relative;
  transition: background 0.18s ease, transform 0.18s ease;
}
.day-card:hover { background: var(--paper-2); }
.day-card.today {
  background: var(--paper-2);
  border-color: var(--ink);
  border-width: 1px;
  box-shadow: 3px 3px 0 var(--ink);
  transform: translate(-1px, -1px);
}
.day-card.done { opacity: 0.55; }
.day-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px;
}
.day-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
}
.day-status {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  padding: 2px 8px;
  border: 1px solid currentColor;
  text-transform: uppercase;
}
.day-status.now { color: var(--crimson); }
.day-status.done { color: var(--moss); }
.day-status.future { color: var(--ink-faint); }
.day-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  margin-bottom: 4px;
}
.day-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.05em; }

.task-list { margin-top: 12px; padding-left: 0; list-style: none; }
.task-list li {
  font-size: 14px;
  padding: 6px 0 6px 22px;
  position: relative;
  border-bottom: 1px dotted var(--rule-soft);
  color: var(--ink-soft);
}
.task-list li:last-child { border-bottom: none; }
.task-list li::before {
  content: "✦"; position: absolute; left: 4px; color: var(--ochre); font-size: 11px; top: 8px;
}
.task-list li.done { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
.task-list li.done::before { content: "✓"; color: var(--moss); }
.task-min {
  font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
  margin-left: 8px; letter-spacing: 0.05em;
}

/* progress dots */
.dots {
  display: flex; gap: 5px; margin-top: 10px;
}
.dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid var(--ink-faint);
  background: transparent;
}
.dot.fill { background: var(--forest); border-color: var(--forest); }
.dot.partial { background: var(--ochre); border-color: var(--ochre); }

/* ====================== BUTTONS ====================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  font-family: var(--serif);
  font-size: 15px;
  background: var(--ink);
  color: var(--paper);
  border: 1px solid var(--ink);
  border-radius: 0;
  letter-spacing: 0.02em;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  min-height: 44px;
}
.btn:active { transform: translate(2px, 2px); box-shadow: none; }
.btn.primary { box-shadow: 3px 3px 0 var(--ochre); }
.btn.primary:active { box-shadow: 0 0 0 var(--ochre); }

.btn.ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
}
.btn.ghost:active { background: var(--paper-2); }
.btn.small { padding: 8px 14px; font-size: 13px; min-height: 36px; }
.btn.tiny { padding: 6px 10px; font-size: 11px; min-height: 28px; }
.btn.full { width: 100%; }
.btn.row { display: inline-flex; }
.btn-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0;
}
.btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.btn-glyph { font-family: var(--serif); font-style: italic; }

/* ====================== SRS CARD ====================== */
.srs-stage {
  min-height: 60vh;
  display: flex; flex-direction: column; align-items: stretch; justify-content: space-between;
}
.srs-progress {
  font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
  letter-spacing: 0.15em; text-align: center;
  margin-bottom: 14px;
}
.srs-card {
  flex: 1;
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 28px 22px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  position: relative;
  box-shadow: 4px 4px 0 var(--rule);
  margin-bottom: 16px;
}
.srs-card .pos {
  position: absolute; top: 12px; left: 14px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.18em; color: var(--ochre-deep);
  text-transform: uppercase;
}
.srs-card .tag {
  position: absolute; top: 12px; right: 14px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.12em; color: var(--ink-faint);
  text-transform: uppercase;
}
.srs-card .pill {
  position: absolute; bottom: 12px; left: 14px;
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-faint); letter-spacing: 0.05em;
}
.srs-en {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 400;
  letter-spacing: -0.005em;
  line-height: 1.15;
  margin-bottom: 6px;
}
.srs-en.phrase { font-size: 26px; }
.srs-pron {
  font-family: var(--mono); font-size: 13px; color: var(--ink-faint);
  margin-bottom: 16px;
}
.srs-ja {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink-soft);
  margin: 8px 0 18px;
  display: none;
}
.srs-ex {
  font-style: italic;
  font-size: 15px;
  color: var(--ink-soft);
  border-top: 1px dotted var(--rule);
  padding-top: 14px;
  margin-top: 12px;
  width: 100%;
  display: none;
}
.srs-ex .exja {
  display: block;
  font-style: normal;
  font-size: 13px;
  color: var(--ink-faint);
  margin-top: 6px;
}
.srs-card.flipped .srs-ja, .srs-card.flipped .srs-ex { display: block; }

.srs-controls { display: grid; grid-template-columns: 1fr; gap: 10px; }
.rate-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.rate-btn {
  padding: 12px 6px;
  font-family: var(--serif);
  font-size: 13px;
  border: 1px solid var(--ink);
  background: var(--paper);
  text-align: center;
  min-height: 56px;
  display: flex; flex-direction: column; gap: 2px;
  align-items: center; justify-content: center;
}
.rate-btn .rate-key {
  font-family: var(--mono); font-size: 9px; color: var(--ink-faint);
  letter-spacing: 0.1em;
}
.rate-btn:active { background: var(--ink); color: var(--paper); }
.rate-btn.again { border-color: var(--crimson); color: var(--crimson); }
.rate-btn.hard { border-color: var(--ochre-deep); color: var(--ochre-deep); }
.rate-btn.good { border-color: var(--moss); color: var(--moss); }
.rate-btn.easy { border-color: var(--forest); color: var(--forest); }

/* ====================== INTRO MODULE ====================== */
.intro-text {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.7;
}
.intro-text .line {
  display: block;
  padding: 4px 0;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.15s ease;
}
.intro-text .line.playing { background: rgba(184,137,92,0.18); }
.intro-text .line.done { color: var(--ink-faint); }
.intro-ja {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule);
  font-size: 14px;
  color: var(--ink-soft);
}
.intro-ja .line {
  display: block;
  padding: 2px 0;
  font-family: var(--serif);
}

.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  border: 1px solid var(--ink);
  margin-bottom: 18px;
}
.mode-tab {
  padding: 10px 4px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-align: center;
  text-transform: uppercase;
  background: var(--paper);
  border-right: 1px solid var(--ink);
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active { background: var(--ink); color: var(--paper); }

.player-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  margin-bottom: 16px;
}
.player-bar .play-btn {
  width: 40px; height: 40px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.player-bar .play-btn.playing { background: var(--paper); color: var(--ink); }
.speed-row {
  display: flex; gap: 4px; margin-left: auto;
}
.speed-btn {
  padding: 4px 8px;
  font-family: var(--mono);
  font-size: 11px;
  border: 1px solid var(--rule);
  color: var(--ink-soft);
}
.speed-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ====================== Q&A ====================== */
.qa-card {
  border: 1px solid var(--rule);
  padding: 16px 18px;
  margin-bottom: 14px;
  background: var(--paper);
}
.qa-q {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 6px;
}
.qa-q::before { content: "Q. "; color: var(--ochre-deep); font-style: italic; }
.qa-q-ja {
  font-size: 13px; color: var(--ink-faint); margin-bottom: 12px;
  font-family: var(--serif);
}
.qa-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.qa-answer {
  margin-top: 14px;
  padding: 14px;
  background: var(--paper-2);
  border-left: 3px solid var(--forest);
  font-size: 15px;
  line-height: 1.65;
  display: none;
}
.qa-answer.show { display: block; }
.qa-answer .a-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--forest);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.qa-answer .a-keys {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dotted var(--rule);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.03em;
}

/* ====================== PHRASES ====================== */
.phrase-group {
  margin-bottom: 24px;
}
.phrase-group h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--ochre-deep);
  text-transform: uppercase;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 6px;
  margin-bottom: 12px;
  font-weight: 500;
}
.phrase-row {
  display: flex; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px dotted var(--rule-soft);
  align-items: flex-start;
}
.phrase-text {
  flex: 1;
}
.phrase-en {
  font-family: var(--serif);
  font-size: 15px;
  line-height: 1.4;
}
.phrase-ja {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 2px;
}
.phrase-play {
  width: 32px; height: 32px;
  border: 1px solid var(--ink);
  background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.phrase-play:active { background: var(--ink); color: var(--paper); }

/* ====================== READING ====================== */
.read-text {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.7;
  margin-bottom: 18px;
}
.read-text .word {
  cursor: pointer;
  border-bottom: 1px dashed transparent;
  transition: border-color 0.15s ease, background 0.15s ease;
  padding: 0 1px;
}
.read-text .word.tapped {
  background: rgba(184,137,92,0.2);
  border-bottom-color: var(--ochre);
}
.gloss-popup {
  position: fixed;
  background: var(--ink);
  color: var(--paper);
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--serif);
  z-index: 100;
  max-width: 240px;
  box-shadow: 3px 3px 0 var(--ochre);
}
.gloss-popup .gloss-en {
  font-style: italic; color: var(--ochre); font-size: 11px;
  font-family: var(--mono); letter-spacing: 0.05em;
  margin-bottom: 2px;
}

/* ====================== SHADOWING ====================== */
.shadow-item {
  border: 1px solid var(--rule);
  padding: 16px;
  margin-bottom: 14px;
  background: var(--paper);
}
.shadow-en {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.6;
  margin-bottom: 8px;
}
.shadow-ja {
  font-size: 12px; color: var(--ink-faint); margin-bottom: 10px;
}
.shadow-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* ====================== ATTEMPT TEXTAREA ====================== */
.attempt-area {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 14px;
  font-family: var(--serif);
  font-size: 16px;
  line-height: 1.5;
  min-height: 80px;
  resize: vertical;
  margin-top: 10px;
}
.diff-out {
  background: var(--paper-2);
  border: 1px solid var(--rule);
  padding: 12px 14px;
  margin-top: 10px;
  font-size: 14px;
  font-family: var(--serif);
  line-height: 1.6;
}
.diff-match { color: var(--moss); }
.diff-extra { color: var(--crimson); text-decoration: line-through; }
.diff-missing { background: rgba(184,137,92,0.3); color: var(--ochre-deep); padding: 0 2px; }
.diff-summary {
  font-family: var(--mono); font-size: 11px;
  margin-top: 8px; color: var(--ink-faint); letter-spacing: 0.05em;
}

/* ====================== SETTINGS / MISC ====================== */
.kv {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px dotted var(--rule-soft);
  align-items: center;
}
.kv-key { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; text-transform: uppercase; }
.kv-val { font-family: var(--serif); }

.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 88px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper);
  padding: 10px 16px;
  font-family: var(--serif); font-size: 14px;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* prevent text selection ghost on iOS taps */
.nav-item, .day-card, .btn, .rate-btn, .mode-tab, .phrase-play {
  user-select: none; -webkit-user-select: none;
}

/* keyboard hint chip */
.kbd {
  font-family: var(--mono); font-size: 10px;
  border: 1px solid var(--rule);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--ink-faint);
}

/* divider ornament */
.ornament {
  text-align: center; color: var(--ink-faint); margin: 24px 0;
  font-family: var(--serif); font-style: italic; font-size: 13px;
  letter-spacing: 0.4em;
}

/* hide scrollbar nicety */
::-webkit-scrollbar { width: 0; }

/* utility */
.row { display: flex; align-items: center; gap: 10px; }
.row.gap-tight { gap: 6px; }
.right { margin-left: auto; }
.dim { color: var(--ink-faint); }
.tiny { font-size: 11px; }
.mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; } .mt16 { margin-top: 16px; } .mt24 { margin-top: 24px; }
.mb8 { margin-bottom: 8px; } .mb12 { margin-bottom: 12px; } .mb16 { margin-bottom: 16px; }
.center { text-align: center; }
.italic { font-style: italic; }
hr.rule { border: none; border-top: 1px solid var(--rule); margin: 18px 0; }
hr.rule.dotted { border-top-style: dotted; }

/* ====================== MODAL ====================== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(31, 27, 22, 0.55);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  padding-top: calc(var(--safe-top) + 16px);
  padding-bottom: calc(var(--safe-bottom) + 16px);
  animation: fade .2s ease both;
}
.modal-box {
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 22px 22px 18px;
  width: 100%; max-width: 540px;
  max-height: 100%; overflow-y: auto;
  box-shadow: 5px 5px 0 var(--ink);
  position: relative;
}
.modal-box h3 {
  margin-top: 0;
  font-family: var(--serif); font-size: 18px; font-weight: 500;
  color: var(--ink);
}
.modal-textarea {
  width: 100%;
  min-height: 200px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px;
  border: 1px solid var(--rule);
  background: var(--paper-2);
  color: var(--ink);
  resize: vertical;
  margin-top: 10px;
  -webkit-user-select: text;
  user-select: text;
}

/* ====================== CONCEPT LIST (Q&A scoring) ====================== */
.concept-list {
  list-style: none;
  padding: 0; margin: 0 0 12px;
}
.concept-list li {
  padding: 6px 0 6px 24px;
  position: relative;
  font-size: 14px;
  border-bottom: 1px dotted var(--rule-soft);
  line-height: 1.4;
}
.concept-list li:last-child { border-bottom: none; }
.concept-list .concept-icon {
  position: absolute; left: 0; top: 6px;
  font-family: var(--mono); font-size: 13px;
  width: 20px; text-align: center;
}
.concept-list li.concept-hit { color: var(--forest-deep); }
.concept-list li.concept-hit .concept-icon { color: var(--forest); }
.concept-list li.concept-partial { color: var(--ochre-deep); }
.concept-list li.concept-partial .concept-icon { color: var(--ochre-deep); }
.concept-list li.concept-miss { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
.concept-list li.concept-miss .concept-icon { color: var(--crimson); text-decoration: none; }

.score-bar {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin: 10px 0;
}
.score-pip {
  text-align: center; padding: 8px 6px;
  background: var(--paper-2);
  border: 1px solid var(--rule);
  font-family: var(--mono);
}
.score-pip .pip-key { font-size: 9px; letter-spacing: 0.15em; color: var(--ink-faint); text-transform: uppercase; }
.score-pip .pip-val { font-size: 16px; color: var(--ink); margin-top: 2px; }

/* ====================== WORD LIST ====================== */
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 16px; }
.filter-chip {
  padding: 5px 12px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  border: 1px solid var(--rule); background: var(--paper); color: var(--ink-faint);
  border-radius: 100px; white-space: nowrap;
}
.filter-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.word-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 2px; border-bottom: 1px dotted var(--rule-soft);
}
.word-row:last-child { border-bottom: none; }
.word-badge {
  flex-shrink: 0; margin-top: 3px; font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
  padding: 2px 7px; border-radius: 2px; min-width: 60px;

.word-badge.new      { background: var(--rule-soft); color: var(--ink-faint); }
.word-badge.learning { background: rgba(184,137,92,0.22); color: var(--ochre-deep); }
.word-badge.review   { background: rgba(74,103,65,0.15); color: var(--forest-deep); }
.word-badge.mastered { background: var(--ink); color: var(--paper); }
.word-en  { font-family: var(--serif); font-size: 15px; line-height: 1.3; }
.word-ja  { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
.word-meta { font-family: var(--mono); font-size: 10px; color: var(--rule); margin-top: 2px; }

/* tappable words (shared by reading and Q&A) */
.qa-word, .read-text .word {
  cursor: pointer;
  border-bottom: 1px dashed var(--rule);
  transition: background 0.12s ease, border-color 0.12s ease;
  padding: 0 1px;
}
.qa-word:hover, .qa-word.tapped,
.read-text .word:hover, .read-text .word.tapped {
  background: rgba(184,137,92,0.18);
  border-bottom-color: var(--ochre);
}

.qa-answer-ja {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--paper);
  border-left: 3px solid var(--ochre);
  font-family: var(--serif);
  font-size: 14px;
  line-height: 1.75;
  color: var(--ink-soft);
  display: none;
}
.qa-answer-ja.show { display: block; }
.section-head {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ochre-deep); font-weight: 500;
  padding: 14px 0 5px; border-bottom: 1px solid var(--rule);
  margin-bottom: 2px; margin-top: 8px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.section-head .sect-count { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.05em; }

.backup-warn {
  background: rgba(166, 68, 58, 0.08);
  border-left: 3px solid var(--crimson);
  padding: 10px 12px;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-soft);
}
.backup-warn strong { color: var(--crimson); }

/* hide scrollbar in webkit */
*::-webkit-scrollbar { display: none; }
</style>
</head>

  // ⓪-2 スタジオ訪問・面談（Robert Zhao / 通訳なし）想定
  qa: [
    {
      q: "Walk me through your tea ceremony work.",
      qja: "茶会の作品について教えてください。",
      a: "I made a participatory work. Participants compared three teas. Each tea was made with a different power source. Solar power. Virtual renewable energy. And regular electricity. I wanted to see if information changes how things taste. For some people — it did. Not all.",
      aJa: "参加型の作品を作りました。参加者は3種類のお茶を比べました。それぞれのお茶は、異なる電源で作られました。太陽光発電。実質再生可能エネルギー。そして通常の電気。情報が味の感じ方を変えるかどうか知りたかった。一部の人には変化がありました。全員ではありません。",
      keys: ["three", "power source", "information changes", "not all"]
    },
    {
      q: "What surprised you? What happened that you didn't expect?",
      qja: "予想外の出来事は何でしたか？",
      a: "Most participants did not know what 'virtual renewable energy' means. So we started with explaining that. I found that interesting. The word 'renewable' sounds clean. People trust it. But they have not really thought about what it is. The work became a conversation about that.",
      aJa: "ほとんどの参加者は「実質再生可能エネルギー」の意味を知りませんでした。だから説明することから始めました。それが面白いと思いました。「再生可能」という言葉は清潔に聞こえます。人々はそれを信じます。でも、実際に何なのかを本当に考えたことはない。作品はその会話になりました。",
      keys: ["did not know", "explaining", "renewable sounds clean", "trust it", "conversation"]
    },
    {
      q: "Your work is always about people — perception, brain waves. Why do you want to shift to landscapes and non-human life?",
      qja: "あなたの作品はいつも人間についてです。なぜ景観や非人間的な生命へ転換したいのですか？",
      a: "I work at an electric power company. Every day, I hear about solar farms, power plants, batteries. I hear how my company shapes land. But I don't see it. I don't understand it directly. I want to look at that. Not the system — the actual place. What is living there.",
      aJa: "私は電力会社に勤めています。毎日、太陽光発電所、発電所、蓄電池の話を聞きます。会社がどのように土地を形作るかを聞きます。でも見ていません。直接理解していません。それを見たいのです。システムではなく——実際の場所を。そこに何が生きているかを。",
      keys: ["electric power company", "shapes land", "don't see it", "actual place", "living there"]
    },
    {
      q: "Have you ever observed something — a place, an animal, a plant — over a long time?",
      qja: "何か一つのもの（場所・動物・植物）を長い時間観察したことはありますか？",
      a: "People, yes. I observe people in stations, in parks, in everyday spaces. I notice how they move and stop. But not animals. Not landscapes. Never for a long time. That is honest. This workshop is my first time doing this.",
      aJa: "人間はそうです。駅、公園、日常の場所で人々を観察します。どのように動いて止まるかに気づきます。でも動物は違います。景観も違います。長い時間は一度もありません。それが正直なところです。このワークショップが初めてです。",
      keys: ["people", "stations", "not animals", "not landscapes", "honest", "first time"]
    },
    {
      q: "Tell me about 'Flow.' What were you trying to find out?",
      qja: "「Flow」について教えてください。何を調べようとしていましたか？",
      a: "I started with a personal problem. I could not concentrate. So I made a work about that. Participants wear a brainwave device. They do their own work — reading, making things. They see their concentration as particles. When concentration and relaxation are both high, the particles form the word 'FLOW.' It is an observation of oneself.",
      aJa: "個人的な問題から始めました。集中できなかった。だからそれについての作品を作りました。参加者は脳波計を装着します。自分の作業をします——読書、ものづくり。集中状態をパーティクルとして見ます。集中とリラックスの両方が高いとき、パーティクルは「FLOW」という文字になります。自分自身の観察です。",
      keys: ["personal problem", "could not concentrate", "brainwave device", "own work", "observation of oneself"]
    },
    {
      q: "I looked at your portfolio. Your works involve a lot of specialists — a neuroscientist, researchers. Why?",
      qja: "ポートフォリオを見ると、神経科学者や研究者との協働が多いですね。なぜですか？",
      a: "I know what I want to ask. But I don't know how to answer it alone. So I find people who know the science. For the tea ceremony — electricity specialists. For Flow — a brain researcher. I build the experience with them. That process is also interesting to me.",
      aJa: "何を問いたいかは知っています。でも一人で答える方法を知りません。だから科学を知っている人を見つけます。茶会では——電力の専門家。Flowでは——脳の研究者。彼らと一緒に体験を作ります。そのプロセス自体も私には興味深い。",
      keys: ["what I want to ask", "find people who know", "electricity specialists", "brain researcher", "build with them"]
    },
    {
      q: "I've seen you've looked at some of my work online. What did you notice?",
      qja: "私の作品をオンラインで見てくれたようですね。何に気づきましたか？",
      a: "I saw animals in very ordinary places. Near buildings, near roads. And the way you document — careful, patient. Like a scientist, but also like a poet. The animal is in a place humans made. But the animal does not know that. That gap is interesting to me.",
      aJa: "ごく普通の場所にいる動物を見ました。建物の近く、道路の近く。そしてあなたの記録の仕方——丁寧で、忍耐強い。科学者のように、でも詩人のようにも。動物は人間が作った場所にいます。でも動物はそれを知りません。そのギャップが興味深い。",
      keys: ["ordinary places", "careful patient", "scientist and poet", "humans made", "does not know", "gap"]
    },
    {
      q: "Is there a specific place in Kyoto you're curious about?",
      qja: "京都で気になっている特定の場所はありますか？",
      a: "Not yet. I am honest — I don't have a specific place. But I am sensitive to infrastructure. Power lines. Water canals. Substations. Places where human systems touch something living. I think I will start there — but I need to be in Kyoto first.",
      aJa: "まだありません。正直なところ——具体的な場所がない。でもインフラに敏感です。電線。用水路。変電設備。人間のシステムが生きているものに触れる場所。そこから始めると思います——でも、まず京都にいる必要があります。",
      keys: ["not yet", "honest", "infrastructure", "power lines", "human systems touch something living", "be in Kyoto first"]
    },
    {
      q: "What does 'managed landscape' mean to you?",
      qja: "「管理された景観」とはあなたにとって何を意味しますか？",
      a: "A landscape that looks natural. But there is a human decision behind it. The shape of a riverbank. The spacing of street trees. A rice paddy. Someone decided that. And something else — animals, plants, water — lives inside that decision. Without knowing.",
      aJa: "自然に見える景観。でもその背後に人間の決定があります。河岸の形。街路樹の間隔。水田。誰かがそれを決めました。そして別の何か——動物、植物、水——がその決定の中で生きています。知ることなく。",
      keys: ["looks natural", "human decision", "riverbank", "rice paddy", "lives inside that decision", "without knowing"]
    },
    {
      q: "What does 'after control' mean to you personally?",
      qja: "「アフター・コントロール」はあなた個人にとって何を意味しますか？",
      a: "Honestly, I am not sure. Maybe it means what is left when control stops. Or what exists that was never fully controlled. I think my understanding of this will change after the fieldwork.",
      aJa: "正直、よくわかりません。コントロールが止まったときに残るものかもしれない。または完全にはコントロールされていないものかもしれない。これについての理解は、フィールドワーク後に変わると思います。",
      keys: ["not sure", "what is left", "never fully controlled", "will change after fieldwork"]
    },
    {
      q: "What does your day job have to do with your art?",
      qja: "本業とアートはどう関係していますか？",
      a: "On the surface — nothing. I do digital service planning. Not power plants, not nature. But I hear the language of energy and land every day. I don't understand the real thing. Only the business side. That distance is uncomfortable. And that discomfort is where my art begins.",
      aJa: "表面上は——何もない。デジタルサービスの企画をしています。発電所でも自然でもない。でも毎日、エネルギーと土地の言語を聞きます。実際のことは理解していません。ビジネスの側面だけ。その距離は不快です。そしてその不快さが私のアートの始まりです。",
      keys: ["digital service planning", "language of energy and land", "only business side", "uncomfortable", "discomfort is where art begins"]
    },
    {
      q: "What do you want to take back from this workshop — to your own practice?",
      qja: "このワークショップから自分の実践に持ち帰りたいことは何ですか？",
      a: "A new way of starting. My work always begins with a question. But the question comes from thinking. I want to learn to start from watching. From staying in one place and really seeing. I hope that changes how I work.",
      aJa: "新しい始め方を。私の作品はいつも問いから始まります。でも問いは考えることから来ます。見ることから始めることを学びたい。一つの場所に留まって、本当に見ることから。それが私の仕事の仕方を変えてくれることを願います。",
      keys: ["new way of starting", "begins with a question", "from thinking", "start from watching", "one place", "changes how I work"]
    }

<script>
/* ===== STATE / PERSISTENCE ===== */
const STORAGE_KEY = "fieldnotes_v1";
const APP_VERSION = "0511-d"; // ← デプロイごとに変える（例: 0511-e, 0512-a, ...）

const State = {
  data: null,
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this.data = raw ? JSON.parse(raw) : this._fresh();
    } catch (e) { this.data = this._fresh(); }
    // ensure structure migrations
    const f = this._fresh();
    for (const k in f) if (!(k in this.data)) this.data[k] = f[k];
    // ensure vocab cards exist for each entry
    DATA.vocab.forEach((v, i) => {
      if (!this.data.cards[i]) {
        this.data.cards[i] = { box: 0, due: 0, seen: 0, lastCorrect: false };
      }
    });
  },
  save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); } catch (e) {}
  },
  _fresh() {
    return {
      userName: "",
      customIntro: null,           // null = use default
      cards: {},                   // index -> { box, due, seen, lastCorrect }
      doneTasks: {},               // task id -> true
      qaSeen: {},                  // q index -> count
      phrasePlayed: {},            // phrase key -> count
      recScores: {},               // key -> { score, attempt } for speech scoring
      lastBackupAt: 0,             // unix ms of last export (for reminders)
      lastVisit: Date.now(),
      ttsRate: 1.0
    };
  }
};

/* ===== UTILITY ===== */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function html(strings, ...vals) {
  let s = "";
  strings.forEach((str, i) => { s += str + (vals[i] !== undefined ? vals[i] : ""); });
  return s;
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function getName() {
  return State.data.userName || "[your name]";
}
function applyName(text) {
  return text.replaceAll("__NAME__", getName());
}
function toast(msg, ms=1600) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("show"), ms);
}

/* ===== TTS (Speech Synthesis) ===== */
const TTS = {
  voice: null,
  ready: false,
  init() {
    const pickVoice = () => {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      // prefer en-US natural voices
      const prefs = [
        v => v.lang === "en-US" && /Samantha|Ava|Allison|Joanna|Karen|Moira|Aaron/.test(v.name),
        v => v.lang === "en-US" && v.localService,
        v => v.lang === "en-US",
        v => v.lang === "en-GB",
        v => v.lang.startsWith("en")
      ];
      for (const p of prefs) { const m = voices.find(p); if (m) { this.voice = m; break; } }
      this.ready = true;
    };
    pickVoice();
    if (!this.ready) speechSynthesis.onvoiceschanged = pickVoice;
  },
  speak(text, opts={}) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = opts.rate || State.data.ttsRate || 1.0;
    u.pitch = opts.pitch || 1.0;
    if (this.voice) u.voice = this.voice;
    if (opts.onend) u.onend = opts.onend;
    if (opts.onstart) u.onstart = opts.onstart;
    speechSynthesis.speak(u);
    return u;
  },
  cancel() { speechSynthesis.cancel(); }
};

/* ===== SPEECH RECOGNITION ===== */
const SpeechRec = {
  SRClass: null,
  rec: null,
  available: false,
  _stopped: false,
  _delivered: false,
  _accumulated: "",   // confirmed finals across restarts
  _lastInterim: "",   // last interim (fallback if iOS never fires isFinal)
  _opts: null,
  _restartTimer: null,

  init() {
    this.SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
    this.available = !!this.SRClass;
  },

  start(opts = {}) {
    if (!this.available) { opts.onFallback?.(); return; }
    this._opts      = opts;
    this._stopped   = false;
    this._delivered = false;
    this._accumulated  = "";
    this._lastInterim  = "";
    this._session();
  },

  _session() {
    try { if (this.rec) this.rec.abort(); } catch(e) {}
    clearTimeout(this._restartTimer);

    const rec = new this.SRClass();
    rec.lang = "en-US";
    rec.continuous = false;       // iOS compatible; restart is handled in onend
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onresult = e => {
      let newFinals = "";
      let currentInterim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          newFinals += e.results[i][0].transcript + " ";
        } else {
          currentInterim = e.results[i][0].transcript;  // latest interim
        }
      }
      if (newFinals)     this._accumulated += newFinals;
      if (currentInterim) this._lastInterim = currentInterim;

      const display = (this._accumulated + currentInterim).trim();
      if (display) this._opts?.onInterim?.(display);
    };

    rec.onerror = e => {
      // "aborted" = we called abort() intentionally; "no-speech" = silence timeout
      // Both are expected; onend will fire after these and handle restart/deliver
      if (e.error === "aborted" || e.error === "no-speech") return;
      this._opts?.onError?.(e.error);
    };

    rec.onend = () => {
      if (this._stopped) {
        this._deliver();
        return;
      }
      // Auto-cutoff by iOS → silent restart after short pause
      this._restartTimer = setTimeout(() => {
        if (!this._stopped) this._session();
      }, 180);
    };

    try {
      rec.start();
      this.rec = rec;
    } catch(e) {
      this._opts?.onError?.("start: " + e.message);
    }
  },

  _deliver() {
    if (this._delivered) return;
    this._delivered = true;
    // Priority: confirmed finals → last interim (iOS often never fires isFinal)
    const final = this._accumulated.trim() || this._lastInterim.trim();
    if (final) this._opts?.onResult?.(final);
    else this._opts?.onError?.("no-result");  // truly nothing recognised
    this._opts?.onEnd?.();
  },

  stop() {
    this._stopped = true;
    clearTimeout(this._restartTimer);
    try { this.rec?.abort(); } catch(e) {}
    // Safety net: deliver after abort (onend can be delayed on iOS)
    setTimeout(() => this._deliver(), 250);
  }
};

/* ===== SPEECH SCORING ===== */
function scoreAgainst(attempt, target) {
  if (!attempt || !attempt.trim()) return null;
  const tT = tokenize(target);
  const tA = tokenize(attempt);
  if (!tT.length) return null;
  const diff = lcs(tT, tA);
  const matched = diff.filter(d => d[0] === "match").length;
  const score = Math.round((matched / tT.length) * 100);
  return { score, diff, matched, total: tT.length };
}

function renderScoreHtml(result, attempt) {
  if (!result) return "";
  const color = result.score >= 80 ? "var(--forest)" : result.score >= 50 ? "var(--ochre-deep)" : "var(--crimson)";
  const label = result.score >= 80 ? "Excellent!" : result.score >= 50 ? "Getting there." : "Once more.";
  const diffHtml = result.diff.map(([type, tok]) => {
    if (type === "match")   return `<span class="diff-match">${escapeHtml(tok)}</span>`;
    if (type === "missing") return `<span class="diff-missing">${escapeHtml(tok)}</span>`;
    return ""; // extra words: not penalised in display
  }).join(" ");
  return `
    <div class="diff-out">
      <div style="font-family:var(--mono);font-size:13px;color:${color};margin-bottom:8px;letter-spacing:0.05em;">
        ${result.score}% · ${label}
        <span style="color:var(--ink-faint);margin-left:8px;">${result.matched}/${result.total} words</span>
      </div>
      <div style="line-height:1.6;">${diffHtml}</div>
      <div class="diff-summary">You said: &ldquo;${escapeHtml(attempt.trim())}&rdquo;</div>
      <div class="diff-summary" style="margin-top:4px;">緑=合ってる / 黄=抜けてる（余分な語は採点外）</div>
    </div>`;
}

/* ===== Q&A SEMANTIC SCORING =====
   Three-axis evaluation:
   1. Concepts: % of required key concepts (from qData.keys) present in attempt
   2. Length: appropriate fullness vs model answer
   3. Structure: presence of subject + verb (basic grammar sanity)
   This is heuristic, not a true LLM grader, but reflects what a human listener checks:
   "Did they mention the key ideas? Was it long enough? Did they speak in sentences?"
*/
function scoreQAAnswer(attempt, qData) {
  if (!attempt || !attempt.trim()) return null;
  const target = applyName(qData.a);
  const keys = qData.keys || [];

  const attemptTokens = tokenize(attempt);
  const attemptStems = attemptTokens.map(stem);
  // expand attempt stems with synonyms for matching
  const attemptStemSet = new Set();
  attemptStems.forEach(s => {
    attemptStemSet.add(s);
    if (SYN_MAP[s]) SYN_MAP[s].forEach(x => attemptStemSet.add(x));
  });

  // 1. KEY CONCEPT COVERAGE
  const keyHits = keys.map(key => {
    const keyTokens = tokenize(key).filter(t => !["the","a","an","of","to","in","on","at","for","with","and","or","but","is","are"].includes(t));
    const keyStems = keyTokens.map(stem);
    if (keyStems.length === 0) return { key, ratio: 0, hit: false, matched: 0, total: 0 };
    const matched = keyStems.filter(s => attemptStemSet.has(s)).length;
    const ratio = matched / keyStems.length;
    return {
      key,
      ratio,
      hit: ratio >= 0.6,                      // ≥60% of key's content words → hit
      partial: ratio >= 0.3 && ratio < 0.6,
      matched, total: keyStems.length
    };
  });
  const conceptScore = keys.length > 0
    ? keyHits.reduce((sum, k) => sum + (k.hit ? 1 : k.partial ? 0.5 : 0), 0) / keys.length
    : 0;

  // 2. LENGTH
  const targetLen = tokenize(target).length;
  const attemptLen = attemptTokens.length;
  const ratio = attemptLen / Math.max(1, targetLen);
  let lenScore;
  if (ratio < 0.25)      lenScore = ratio / 0.25 * 0.4;
  else if (ratio < 0.6)  lenScore = 0.4 + (ratio - 0.25) / 0.35 * 0.4;
  else if (ratio <= 1.5) lenScore = 0.8 + (1 - Math.abs(1 - ratio) / 0.5) * 0.2;
  else                   lenScore = 0.85;
  lenScore = Math.max(0, Math.min(1, lenScore));

  // 3. STRUCTURE — basic sentence sanity
  const lower = attempt.toLowerCase();
  const hasSubject = /\b(i|we|my|our|this|that|it|the|there|they|he|she)\b/.test(lower);
  const hasVerb = /\b(am|is|are|was|were|have|has|had|do|does|did|use|uses|used|using|make|makes|made|making|work|works|worked|working|think|thinks|feel|feels|find|finds|see|saw|like|likes|interested|focus|focuses|focused|observe|observed|want|wanted|hope|create|creates|created)\b/.test(lower);
  const sentenceCount = (attempt.match(/[.!?]+/g) || []).length;
  const structScore = (hasSubject ? 0.45 : 0) + (hasVerb ? 0.45 : 0) + (sentenceCount >= 1 ? 0.10 : 0);

  // OVERALL — weight concepts heaviest (intent matters most)
  const overall = Math.round((conceptScore * 0.65 + lenScore * 0.20 + structScore * 0.15) * 100);

  return {
    score: overall,
    concepts: { score: conceptScore, breakdown: keyHits },
    length:   { ratio, score: lenScore, attempt: attemptLen, target: targetLen },
    structure:{ hasSubject, hasVerb, sentences: sentenceCount, score: structScore }
  };
}

function renderQAScoreHtml(result, attempt) {
  if (!result) return "";
  const score = result.score;
  const color = score >= 75 ? "var(--forest)" : score >= 55 ? "var(--ochre-deep)" : "var(--crimson)";
  const label = score >= 80 ? "Strong — concepts conveyed."
              : score >= 65 ? "Mostly there — minor gaps."
              : score >= 45 ? "Partial — add the missing concepts."
              : "Try again — mention the key ideas.";

  const conceptList = result.concepts.breakdown.map(c => {
    const icon = c.hit ? "✓" : (c.partial ? "◐" : "✗");
    const cls = c.hit ? "concept-hit" : (c.partial ? "concept-partial" : "concept-miss");
    return `<li class="${cls}"><span class="concept-icon">${icon}</span>${escapeHtml(c.key)}</li>`;
  }).join("");

  const warns = [];
  if (!result.structure.hasSubject) warns.push("主語が見つかりません（I, we, this 等）");
  if (!result.structure.hasVerb) warns.push("動詞が見つかりません（am, is, work, use 等）");
  if (result.length.ratio < 0.4) warns.push(`短すぎ（${result.length.attempt}語、目安 ${Math.round(result.length.target * 0.6)}語以上）`);
  const warnHtml = warns.length
    ? `<div class="diff-summary" style="color:var(--crimson);">⚠ ${warns.join(" / ")}</div>`
    : "";

  return `
    <div class="diff-out">
      <div style="font-family:var(--mono);font-size:14px;color:${color};margin-bottom:6px;letter-spacing:0.05em;">
        <strong>${score}%</strong> &nbsp; ${label}
      </div>

      <div class="score-bar">
        <div class="score-pip"><div class="pip-key">Concepts</div><div class="pip-val">${Math.round(result.concepts.score*100)}%</div></div>
        <div class="score-pip"><div class="pip-key">Length</div><div class="pip-val">${Math.round(result.length.score*100)}%</div></div>
        <div class="score-pip"><div class="pip-key">Structure</div><div class="pip-val">${Math.round(result.structure.score*100)}%</div></div>
      </div>

      <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-faint);text-transform:uppercase;margin:14px 0 4px;">Key concepts</div>
      <ul class="concept-list">${conceptList}</ul>

      ${warnHtml}
      <div class="diff-summary">You said: &ldquo;${escapeHtml(attempt.trim())}&rdquo;</div>
      <div class="diff-summary">✓=言及あり / ◐=部分的 / ✗=言及なし。語形違い（observed/observing）と類義語は正解扱い。</div>
    </div>`;
}

/* Tokenize and wrap each English word with a tappable gloss span */
function glossifyAnswer(text) {
  const dict = getWordDict();
  // Split on word / non-word boundaries; odd indices are words
  const parts = text.split(/\b/);
  return parts.map(part => {
    if (/^[a-zA-Z']+$/.test(part)) {
      const key = part.toLowerCase().replace(/'/g, "");
      const gloss = dict[key];
      if (gloss) {
        return `<span class="qa-word" data-gloss="${escapeHtml(gloss)}">${escapeHtml(part)}</span>`;
      }
      return escapeHtml(part);
    }
    return escapeHtml(part);
  }).join("");
}

  const diff = Math.floor((today - start) / (1000*60*60*24));
  return Math.max(0, Math.min(5, diff));
}

/* ===== SRS — Leitner-box ===== */
const SRS = {
  // boxes: 0 new, 1 learn (~10min), 2 (1d), 3 (3d), 4 mastered (skip)
  intervals: [0, 1/144, 1, 3, 30], // days; box 4 effectively mastered
  nextDue(box) { return Date.now() + this.intervals[box] * 86400000; },
  rate(idx, quality) {
    // quality: again=0, hard=1, good=2, easy=3
    const c = State.data.cards[idx] = State.data.cards[idx] || { box:0, due:0, seen:0 };
    c.seen++;
    if (quality === 0) {
      c.box = 1;
    } else if (quality === 1) {
      c.box = Math.max(1, c.box);
    } else if (quality === 2) {
      c.box = Math.min(4, c.box + 1);
    } else if (quality === 3) {
      c.box = Math.min(4, c.box + 2);
    }
    c.due = this.nextDue(c.box);
    c.lastCorrect = quality > 0;
    State.save();
  },
  dueToday() {
    const now = Date.now();
    return DATA.vocab.map((v,i) => ({i, v, c: State.data.cards[i]}))
      .filter(o => o.c.box < 4 && o.c.due <= now);
  },
  newToday(limit=20) {
    return DATA.vocab.map((v,i) => ({i, v, c: State.data.cards[i]}))
      .filter(o => o.c.seen === 0)
      .sort((a,b) => (a.v.pri||3) - (b.v.pri||3))
      .slice(0, limit);
  },
  stats() {
    let neww=0, learning=0, review=0, mastered=0;
    for (let i=0; i<DATA.vocab.length; i++) {
      const c = State.data.cards[i] || {box:0, seen:0};
      if (c.seen === 0) neww++;
      else if (c.box <= 1) learning++;
      else if (c.box < 4) review++;
      else mastered++;
    }
    return { neww, learning, review, mastered, total: DATA.vocab.length };
  }
};

  vocab_browse() {
    const TAG_NAMES = {
      self:"Self & Profession", theme:"Themes", art:"Art Practice",
      eco:"Ecology / More-than-human", field:"Fieldwork & Observation",
      land:"Landscape & Terrain", sense:"Sensory & Perception",
      behav:"Behavior & Biology", time:"Time & Process",
      doc:"Documentation", concept:"Art-Conceptual",
      body:"Body & Movement", talk:"Discussion phrases",
      repair:"Repair / Clarification", misc:"Workshop Context"
    };

    const statusOf = c => {
      if (!c || c.seen === 0) return "new";
      if (c.box >= 4) return "mastered";
      if (c.box >= 2) return "review";
      return "learning";
    };
    const LABEL = { new:"New", learning:"Learn", review:"Review", mastered:"Done" };

    // count per status
    const counts = { all:0, new:0, learning:0, review:0, mastered:0 };
    DATA.vocab.forEach((v,i) => {
      const s = statusOf(State.data.cards[i]);
      counts.all++; counts[s]++;
    });

    const f = _browseFilter || "all";

    // filter chips
    const chips = ["all","new","learning","review","mastered"].map(k => {
      const labels = { all:"All", new:"New", learning:"Learning", review:"Review", mastered:"Mastered" };
      return `<button class="filter-chip ${f===k?'active':''}" onclick="setBrowseFilter('${k}')">${labels[k]} <span style="font-size:10px;opacity:0.7;">${counts[k]}</span></button>`;
    }).join("");

    // build groups preserving tag order
    const orderedTags = Object.keys(TAG_NAMES);
    const groups = {};
    orderedTags.forEach(t => { groups[t] = []; });
    DATA.vocab.forEach((v,i) => {
      const c = State.data.cards[i];
      const s = statusOf(c);
      if (f !== "all" && s !== f) return;
      if (!groups[v.tag]) groups[v.tag] = [];
      groups[v.tag].push({v, i, c, s});
    });

    let body = "";
    for (const tag of orderedTags) {
      const items = groups[tag];
      if (!items || items.length === 0) continue;
      // count by status in this group
      const gc = { new:0, learning:0, review:0, mastered:0 };
      items.forEach(o => gc[o.s]++);
      const gcStr = [
        gc.mastered ? `<span style="color:var(--ink)">${gc.mastered} done</span>` : "",
        gc.review   ? `<span style="color:var(--forest-deep)">${gc.review} review</span>` : "",
        gc.learning ? `<span style="color:var(--ochre-deep)">${gc.learning} learning</span>` : "",
        gc.new      ? `<span style="color:var(--ink-faint)">${gc.new} new</span>` : ""
      ].filter(Boolean).join(" · ");

      body += `<div class="section-head">${TAG_NAMES[tag] || tag}<span class="sect-count">${gcStr}</span></div>`;
      body += items.map(({v, i, s}) => {
        const priDot = v.pri === 1 ? `<span style="color:var(--crimson);font-size:10px;">★</span>` :
                       v.pri === 2 ? `<span style="color:var(--ochre-deep);font-size:10px;">★</span>` : "";
        const en = escapeHtml(v.en);
        const enSafe = v.en.replace(/'/g, "\\'");
        return `
          <div class="word-row">
            <span class="word-badge ${s}">${LABEL[s]}</span>
            <div style="flex:1;min-width:0;">
              <div class="word-en">${en} ${priDot}</div>
              <div class="word-ja">${escapeHtml(v.ja)}</div>
            </div>
            <button class="phrase-play" style="flex-shrink:0;" onclick="TTS.speak('${enSafe}')">♪</button>
          </div>`;
      }).join("");
    }

    const totalShown = Object.values(groups).flat().length;
    if (totalShown === 0) {
      body = `<p class="lead" style="margin-top:24px;">このフィルタに一致する語はありません。</p>`;
    }

    return `
      <div class="view">
        <div class="kicker">Vocabulary index</div>
        <h1 class="title">Word list</h1>
        <div class="title-rule">${DATA.vocab.length} words total</div>

        <div class="filter-chips">${chips}</div>

        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;">
          <span><span class="word-badge new" style="display:inline-block;vertical-align:middle;">New</span> <span class="tiny dim">未学習</span></span>
          <span><span class="word-badge learning" style="display:inline-block;vertical-align:middle;">Learn</span> <span class="tiny dim">学習中</span></span>
          <span><span class="word-badge review" style="display:inline-block;vertical-align:middle;">Review</span> <span class="tiny dim">復習中</span></span>
          <span><span class="word-badge mastered" style="display:inline-block;vertical-align:middle;">Done</span> <span class="tiny dim">習得済</span></span>
          <span><span style="color:var(--crimson);font-size:11px;">★</span> <span class="tiny dim">優先度高</span></span>
        </div>

        ${body}

        <div class="ornament mt16">·  ·  ·</div>
        <button class="btn ghost full mt12" onclick="Router.go('vocab')">← SRSに戻る</button>

function renderShadow() {

        <button class="btn tiny ghost" onclick="shadowLoop(${i}, 3)">Loop ×3</button>
      </div>
    </div>
  `).join("");
  return `
    <p class="lead">Robert Zhaoの実際の言葉から抽出。<strong>音→真似→意味確認</strong>の順で。意味は後でOK、まず口を動かす。</p>
    <p class="dim tiny">📌 シャドーイングの効果（門田 2007等）：①音韻ループの強化 ②自動化 ③発音矯正。1文を5回繰り返すのが目安。</p>
    ${items}
  `;
}

function renderRead() {
  return DATA.reading.map((r, ri) => {
    // tokenize and inject gloss data
    const tokens = r.bodyEn.split(/(\s+|[.,;:—\-()\u2014\u2013])/).filter(t => t !== "");
    const html = tokens.map(t => {
      const clean = t.toLowerCase().replace(/[^\w-]/g, "");
      // try multi-word matches (greedy from gloss keys)
      // for simplicity, single-word match here; multi-word handled separately below
      const found = Object.keys(r.gloss).find(k => {
        const klow = k.toLowerCase();
        return klow === clean
            || klow.split(/[\s\-]+/)[0] === clean
            || klow.replace(/-/g,"") === clean;
      });
      if (found && /\w/.test(t)) {
        return `<span class="word" data-gloss="${escapeHtml(r.gloss[found])}">${escapeHtml(t)}</span>`;
      }
      return escapeHtml(t);
    }).join("");

    const qs = r.qs.map(q => `<li>${escapeHtml(q)}</li>`).join("");
    return `
      <div class="panel" style="margin-bottom:16px;">
        <div class="kicker">${escapeHtml(r.title)}</div>
        <div class="read-text">${html}</div>
        <button class="btn tiny ghost mt8" onclick="TTS.speak(${JSON.stringify(r.bodyEn).replace(/"/g,'&quot;')}, {rate:0.85})">♪ Read aloud</button>
        <h3 class="mt16">Comprehension</h3>
        <ol style="padding-left:1.2em; font-size:14px; color:var(--ink-soft);">${qs}</ol>
      </div>
    `;
  }).join("") + `<p class="dim tiny mt12">単語をタップすると訳が表示されます。本文を声に出して読むのも有効です。</p>`;
}

/* gloss popup */
function showGloss(e, gloss, word) {
  document.querySelectorAll(".gloss-popup").forEach(x => x.remove());
  document.querySelectorAll(".read-text .word.tapped").forEach(x => x.classList.remove("tapped"));
  e.currentTarget.classList.add("tapped");
  const p = document.createElement("div");
  p.className = "gloss-popup";
  p.innerHTML = `<div class="gloss-en">${escapeHtml(word)}</div><div>${escapeHtml(gloss)}</div>`;
  document.body.appendChild(p);
  const r = e.currentTarget.getBoundingClientRect();
  let left = r.left;
  let top = r.bottom + 6;
  // clamp
  if (left + 240 > window.innerWidth) left = window.innerWidth - 240 - 10;
  if (left < 10) left = 10;
  p.style.left = left + "px";
  p.style.top = top + "px";
  setTimeout(() => {
    document.addEventListener("click", function onOff(){ p.remove(); document.removeEventListener("click", onOff); }, { once:true });
  }, 50);
}

  const lines = (State.data.customIntro || DATA.selfIntro.en).map(applyName);
  if (introPlaying) { TTS.cancel(); introPlaying = false; $("#introPlayBtn").classList.remove("playing"); $("#introPlayBtn").textContent = "▶"; return; }
  introPlaying = true;
  $("#introPlayBtn").classList.add("playing"); $("#introPlayBtn").textContent = "■";
  const queue = lines.map((l, i) => ({ l, i })).filter(o => o.l.trim() !== "");
  let qi = 0;
  function next() {
    if (!introPlaying || qi >= queue.length) {
      introPlaying = false;
      $("#introPlayBtn").classList.remove("playing"); $("#introPlayBtn").textContent = "▶";
      $$("#introText .line").forEach(el => el.classList.remove("playing"));
      $("#introStatus").textContent = "Done.";
      return;
    }
    const { l, i } = queue[qi];
    $$("#introText .line").forEach(el => el.classList.remove("playing"));
    const lineEl = document.querySelector(`#introText .line[data-i="${i}"]`);
    if (lineEl) lineEl.classList.add("playing");
    $("#introStatus").textContent = `${qi+1} / ${queue.length}`;
    TTS.speak(l, { onend: () => { qi++; setTimeout(next, 250); } });
  }
  next();
}
function playIntroLine(i) {
  const lines = (State.data.customIntro || DATA.selfIntro.en).map(applyName);
  const l = lines[i]; if (!l) return;
  $$("#introText .line").forEach(el => el.classList.remove("playing"));
  document.querySelector(`#introText .line[data-i="${i}"]`).classList.add("playing");
  TTS.speak(l, { onend: () => {
    document.querySelector(`#introText .line[data-i="${i}"]`).classList.remove("playing");
  }});
}

/* ===== INTRO DIFF ===== */
function diffIntro() {
  const target = (State.data.customIntro || DATA.selfIntro.en).map(applyName).join(" ").replace(/\s+/g," ").trim();
  const attempt = $("#attemptIntro").value.replace(/\s+/g," ").trim();
  if (!attempt) { toast("入力してください"); return; }
  const tT = tokenize(target); const tA = tokenize(attempt);
  const dp = lcs(tT, tA);
  let html = "<div class='diff-out'>";
  let ti=0, ai=0;
  // produce inline diff: walk through both
  for (const [type, tok] of dp) {
    if (type === "match") html += `<span class="diff-match">${escapeHtml(tok)}</span> `;
    else if (type === "extra") html += `<span class="diff-extra">${escapeHtml(tok)}</span> `;
    else if (type === "missing") html += `<span class="diff-missing">${escapeHtml(tok)}</span> `;
  }
  const matched = dp.filter(d => d[0]==="match").length;
  html += `<div class="diff-summary">match: ${matched}/${tT.length} · 緑=合っている / 黄=抜けている / 赤=余分</div></div>`;
  $("#diffIntro").innerHTML = html;
}

function tokenize(s) {
  return s.toLowerCase().replace(/[.,;:!?"'\u2014\u2013\-]/g," ").split(/\s+/).filter(Boolean);
}
/* Light stemmer: handle common English suffixes for matching purposes.
   Not Porter-quality but sufficient for matching observe/observed/observing,
   work/works/worked, interest/interested/interesting, etc. */
function stem(w) {
  if (typeof w !== "string" || w.length < 4) return w;
  const stops = new Set(["the","a","an","is","are","was","were","be","been","being","of","to","in","on","at","for","with","and","or","but","i","you","my","your","we","our","this","that","it","its","as","by","not"]);
  if (stops.has(w)) return w;
  const suffixes = [
    "ization","ational","fulness","ousness","iveness","tional","ation","iness",
    "ness","ment","tion","sion","ings","ies","ied","ing","ly","es","ed","er","est","s"
  ];
  for (const sf of suffixes) {
    if (w.length > sf.length + 2 && w.endsWith(sf)) {
      let stem = w.slice(0, -sf.length);
      // restore "e" for words like "make"→"making"→"mak" but "make" should be "mak" too, both match
      return stem;
    }
  }
  return w;
}
/* Synonym groups for partial-credit matching of close meanings.
   Each line: canonical first, then variants. */
const SYN_GROUPS = [
  ["observe","watch","notice","look"],
  ["make","create","build","produce"],
  ["work","piece","art","artwork"],
  ["interest","interested","curious","drawn"],
  ["use","using","employ","work-with"],
  ["change","shift","transform","alter"],
  ["place","site","location","spot"],
  ["thing","object","item"],
  ["everyday","daily","mundane","ordinary","familiar"],
  ["focus","attention","concentrate"],
  ["world","environment","surrounding"],
  ["learn","study","explore"],
  ["want","hope","wish","like"],
  ["different","various","diverse"],
  ["start","begin","initiate"],
  ["see","view","perceive"],
  ["live","exist","dwell","inhabit"]
];
const SYN_MAP = (() => {
  const m = {};
  SYN_GROUPS.forEach(g => {
    const stems = g.map(w => stem(w.toLowerCase()));
    stems.forEach(s => { m[s] = stems; });
  });
  return m;
})();
function stemsEquivalent(a, b) {
  if (a === b) return true;
  const sa = SYN_MAP[a];
  if (sa && sa.includes(b)) return true;
  return false;
}
function lcs(a, b) {
  // a, b: arrays of original tokens (lowercased)
  // matches use stem + synonym equivalence; output preserves original surface forms
  const sA = a.map(stem);
  const sB = b.map(stem);
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1}, ()=>new Array(m+1).fill(0));
  for (let i=1;i<=n;i++) for (let j=1;j<=m;j++) {
    if (stemsEquivalent(sA[i-1], sB[j-1])) dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j], dp[i][j-1]);
  }
  // backtrace
  const out=[]; let i=n, j=m;
  while (i>0 && j>0) {
    if (stemsEquivalent(sA[i-1], sB[j-1])) { out.unshift(["match", a[i-1]]); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) { out.unshift(["missing", a[i-1]]); i--; }
    else { out.unshift(["extra", b[j-1]]); j--; }
  }
  while (i>0) { out.unshift(["missing", a[i-1]]); i--; }
  while (j>0) { out.unshift(["extra", b[j-1]]); j--; }
  return out;
}

/* ===== SRS RENDER ===== */
let SRSqueue = [];
function renderNextCard() {
  if (!SRSqueue || SRSqueue.length === 0) {
    SRSqueue = [...SRS.dueToday(), ...SRS.newToday(20)];
  }
  if (SRSqueue.length === 0) {
    $("#srsView").innerHTML = `
      <div class="kicker">Spaced Repetition</div>
      <h1 class="title">All clear.</h1>
      <div class="title-rule">good work</div>
      <p class="lead">今のラウンドは終わりです。少し休んで、また戻ってきてください。</p>
      <button class="btn full ghost" onclick="Router.go('home')">Home</button>`;
    return;
  }
  const next = SRSqueue.shift();
  const v = next.v; const i = next.i;
  const stage = next.c.seen === 0 ? "NEW" : `BOX ${next.c.box}`;
  const isPhrase = (v.en && v.en.length > 22);
  $("#srsView").innerHTML = `
    <div class="srs-stage">
      <div class="srs-progress">${SRSqueue.length+1} remaining · ${stage} · ${tagLabel(v.tag)}</div>
      <div class="srs-card" id="card-${i}">
        <div class="pos">${escapeHtml(v.pos||"")}</div>
        <div class="tag">★${v.pri || 3}</div>
        <div class="srs-en ${isPhrase?'phrase':''}">${escapeHtml(v.en)}</div>
        <button class="btn ghost tiny" onclick="TTS.speak(${JSON.stringify(v.en).replace(/"/g,'&quot;')})">♪ listen</button>
        <div class="srs-ja">${escapeHtml(v.ja)}</div>
        <div class="srs-ex">${escapeHtml(v.ex)}<span class="exja">${escapeHtml(v.exJa||"")}</span></div>
      </div>
      <div class="srs-controls" id="srsControls">
        <button class="btn full" onclick="flipCard(${i})">Show meaning</button>
      </div>
    </div>`;
}
function tagLabel(t) {
  return ({self:"Self", theme:"Theme", art:"Art", eco:"Ecology", field:"Field", talk:"Talk", repair:"Repair", misc:"Misc"})[t] || t;
}
function flipCard(idx) {
  const card = document.querySelector(`#card-${idx}`);
  if (!card) return;
  card.classList.add("flipped");
  $("#srsControls").innerHTML = `
    <div class="rate-row">
      <button class="rate-btn again" onclick="rateAndNext(${idx},0)">Again<span class="rate-key">忘れた</span></button>
      <button class="rate-btn hard" onclick="rateAndNext(${idx},1)">Hard<span class="rate-key">難しい</span></button>
      <button class="rate-btn good" onclick="rateAndNext(${idx},2)">Good<span class="rate-key">わかる</span></button>
      <button class="rate-btn easy" onclick="rateAndNext(${idx},3)">Easy<span class="rate-key">余裕</span></button>
    </div>`;
}
function rateAndNext(idx, q) {
  SRS.rate(idx, q);
  if (q === 0) {
    // re-add to queue at end
    SRSqueue.push({i:idx, v:DATA.vocab[idx], c:State.data.cards[idx]});
  }
  renderNextCard();
}

function toggleTask(id) {
  if (State.data.doneTasks[id]) delete State.data.doneTasks[id];
  else State.data.doneTasks[id] = true;
  State.save();
  Router.render();
}

/* ===== Shadow loop ===== */
let shadowLoopActive = false;
function shadowLoop(i, n) {
  if (shadowLoopActive) { TTS.cancel(); shadowLoopActive = false; toast("Stopped"); return; }
  shadowLoopActive = true;
  const s = DATA.shadowing[i].en;
  let count = 0;
  function go() {
    if (!shadowLoopActive || count >= n) { shadowLoopActive = false; toast("Loop done"); return; }
    count++;
    TTS.speak(s, { rate: count === 1 ? 0.75 : 1.0, onend: () => setTimeout(go, 800) });
  }
  go();
}

/* ===== Name management ===== */
function setNamePrompt() {
  const cur = State.data.userName || "";
  const v = prompt("お名前（呼ばれたい名前）をローマ字で入力してください\n例: Yuki, Haruto, Mika", cur);
  if (v === null) return;
  State.data.userName = v.trim();
  State.save();
  Router.render();
  toast("Name saved.");
}

/* ===== Init ===== */
/* ===== FORCE UPDATE (cache-busting reload) =====
   Appending a unique query param forces Safari to fetch fresh from server
   (cache is keyed by full URL including query string).
   After reload, we detect the param, show a toast, then clean the URL.
*/
function checkUpdate() {
  const ts = Date.now();
  // preserve hash routing; replace so Back button doesn't loop
  location.replace(location.pathname + "?nocache=" + ts + location.hash);
}

function init() {
  State.load();
  TTS.init();
  SpeechRec.init();
  updateDayChip();

  // Detect cache-busting reload: clean URL, show confirmation
  if (location.search.includes("nocache=")) {
    history.replaceState(null, "", location.pathname + location.hash);
    setTimeout(() => toast("✓ 最新版 v" + APP_VERSION + " を読み込みました"), 400);
  }

  // navigation handlers
  $$(".nav-item").forEach(n => {
    n.addEventListener("click", () => Router.go(n.dataset.route));
  });

  // route from hash
  const hash = location.hash.replace("#", "") || "home";
  Router.go(hash);

  // First-run name prompt
  if (!State.data.userName) {
    setTimeout(() => {
      if (!State.data.userName) setNamePrompt();
    }, 700);
  }
}

/* override Router.render to handle day:N */
const _origRender = Router.render.bind(Router);
Router.render = function() {
  const r = this.current;
  if (r && r.startsWith("day:")) {
    const n = parseInt(r.slice(4), 10);
    $("#app").innerHTML = Views.dayDetail(n);
    $$(".nav-item").forEach(x => x.classList.remove("active"));
    $$(".nav-item[data-route='home']").forEach(x => x.classList.add("active"));
    return;
  }
  if (r === "vocab_browse") {
    $("#app").innerHTML = Views.vocab_browse();
    return;
  }
  _origRender();
};

window.addEventListener("DOMContentLoaded", init);
window.addEventListener("hashchange", () => {
  Router.current = location.hash.replace("#","") || "home";
  Router.render();
});
</script>
